# Global settings
source global-config.conf
source family-rk3506.conf

# Board-specific
BOARD=luckfox-lyra-zero-w

# Build classic Bluetooth profile support as modules so the vendor kernel
# doesn't strand them outside bluetooth.ko when CONFIG_BT=m.
function custom_kernel_config__lyra_zero_bt_profiles() {
	opts_m+=(
		CONFIG_BT_RFCOMM
		CONFIG_BT_BNEP
		CONFIG_BT_HIDP
	)
}
